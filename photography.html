<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liam Sullivan</title>
  <link rel="stylesheet" type="text/css" href="css/main.css">
  <script src="js/zoom.js"></script>
</head>
<body>
  <header>
    <nav>
      <label class="logo">Liam Sullivan</label>
      <ul>
          <li><a href="index.html" class="button" target="_self" rel="nofollow">About</a></li>
          <li><a href="resume.html" class="button" target="_self" rel="nofollow">Resume</a></li>
          <li><a href="photography.html" class="button" target="_self" rel="nofollow">Photography</a></li>
          <li><a href="projects.html" class="button" target="_self" rel="nofollow">Projects</a></li>
          <li><a href="contact.html" class="button" target="_self" rel="nofollow">Contact</a></li>
      </ul>
  </nav>
  </header>
    <div class="title-container">
      <h2 class="title">My Portfolio</h2>
    </div>
  <div class="gallery">
    <div class="image-container"></div>
  </div>
  <footer>
    <p>© <script>document.write(new Date().getFullYear())</script> Liam Sullivan</p>
    <a href="https://instagram.com/liamsullivanphoto" target="_blank"><img src="Images/icon1.svg" alt="Instagram" style="width: 24px; height: 24px;"/></a>
    <a href="https://linkedin.com/in/liambsulliva" target="_blank"><img src="Images/icon2.svg" alt="Linkedin" style="width: 24px; height: 24px;"/></a>
  </footer>
  <script>
      const imageContainer = document.querySelector('.image-container');
      const numberOfImages = 55; // You can change this to the total number of images you have

      for (let i = 1; i <= numberOfImages; i++) { // Start from 2 to 55
        const imageTag = document.createElement('img');
        imageTag.src = `Images/portrait${i}.jpg`;
        imageTag.alt = '';
        imageTag.classList.add('zoomable-image');
      
        imageContainer.appendChild(imageTag);
      }

      var icon = document.getElementById('icon');
      icon.onclick = function(){
      document.body.classList.toggle('dark-mode');
      if(document.body.classList.contains('dark-mode')){
        icon.src = 'Images/sun.svg';
      } else {
        icon.src = 'Images/moon.svg';
      }
    }
  </script>
</body>
</html>
